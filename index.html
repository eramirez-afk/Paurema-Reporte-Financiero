<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;padding:20px;}
.container{max-width:1100px;margin:0 auto;}

.header h1{font-size:19px;font-weight:500;}
.header h1 i{font-size:17px;margin-right:6px;color:#185FA5;vertical-align:-2px;}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid #d3d1c7;color:#5F5E5A;background:#fff;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#b4b2a9;flex-shrink:0;}
.sync-dot.ok{background:#3B6D11;}
.sync-dot.syncing{background:#BA7517;animation:blink 0.8s infinite;}
.sync-dot.err{background:#A32D2D;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.topbar label{font-size:12px;color:#5F5E5A;font-weight:500;}
.month-sel{font-size:12px;padding:5px 10px;border:0.5px solid #b4b2a9;border-radius:8px;background:#fff;font-family:inherit;cursor:pointer;outline:none;}
.ops-pill{font-size:11px;padding:4px 12px;border-radius:20px;background:#fff;border:0.5px solid #d3d1c7;color:#5F5E5A;display:flex;gap:8px;align-items:center;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.metric{background:#ededeb;border-radius:8px;padding:14px 16px;}
.metric .label{font-size:12px;color:#5F5E5A;margin-bottom:6px;}
.metric .value{font-size:21px;font-weight:500;}
.metric .sub{font-size:11px;color:#888780;margin-top:3px;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.5rem;}
.chart-card{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;padding:1rem;}
.chart-title{font-size:13px;font-weight:500;margin-bottom:10px;}
.legend{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.legend span{display:flex;align-items:center;gap:5px;font-size:11px;color:#5F5E5A;}
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
.section-title{font-size:14px;font-weight:500;color:#5F5E5A;}
.filters{display:flex;gap:6px;flex-wrap:wrap;}
.fbtn{background:transparent;border:0.5px solid #b4b2a9;border-radius:20px;padding:4px 12px;font-size:11px;color:#5F5E5A;cursor:pointer;}
.fbtn.active{background:#185FA5;color:#fff;border-color:#185FA5;}
.tip{font-size:11px;color:#888780;margin-bottom:8px;}
.table-wrap{overflow-x:auto;margin-bottom:1.5rem;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{border-bottom:0.5px solid #d3d1c7;}
th{font-size:11px;font-weight:500;color:#5F5E5A;text-align:left;padding:8px 6px;white-space:nowrap;}
td{padding:7px 6px;border-bottom:0.5px solid #ededeb;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9f9f7;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;cursor:pointer;}
.badge.PAGADO{background:#EAF3DE;color:#27500A;}
.badge.PENDIENTE{background:#FAEEDA;color:#633806;}
.badge.GASTO{background:#FCEBEB;color:#791F1F;}
.abtn{background:none;border:none;cursor:pointer;font-size:14px;padding:0 3px;color:#b4b2a9;}
.abtn:hover{color:#185FA5;}
.abtn.del:hover{color:#A32D2D;}
.erow td{background:#EEF4FB!important;padding:5px!important;}
.erow input,.erow select{font-size:12px;padding:4px 6px;border:0.5px solid #185FA5;border-radius:6px;background:#fff;font-family:inherit;width:100%;}
.sbtn{background:#185FA5;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;}
.cbtn{background:#fff;color:#5F5E5A;border:0.5px solid #b4b2a9;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;}
.add-form{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;}
.form-title{font-size:14px;font-weight:500;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:11px;color:#5F5E5A;}
.fg input,.fg select{font-size:13px;padding:7px 10px;border:0.5px solid #b4b2a9;border-radius:8px;background:#fff;color:#1a1a18;outline:none;font-family:inherit;}
.fg input:focus,.fg select:focus{border-color:#185FA5;}
.btn-add{margin-top:12px;padding:8px 20px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;}
.btn-add:disabled{background:#b4b2a9;cursor:not-allowed;}
.stamp{font-size:10px;color:#888780;text-align:right;margin-top:8px;}
.mono{font-family:'SF Mono',Consolas,monospace;font-size:11px;}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a18;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
@media(max-width:700px){
  .metrics{grid-template-columns:repeat(2,1fr);}
  .charts-row{grid-template-columns:1fr;}
  .form-grid{grid-template-columns:1fr 1fr;}

</style>
</head>

<div class="topbar">

  <div class="ops-pill" id="opsPill">—</div>
</div>

<div class="metrics" id="metrics"></div>

<div class="charts-row">

</div>

<div class="section-row">
  <div class="section-title">Operaciones</div>
  <div class="filters">

    <button class="fbtn" onclick="setFilter('PAGADO',this)">Pagados</button>
    <button class="fbtn" onclick="setFilter('PENDIENTE',this)">Pendientes</button>
    <button class="fbtn" onclick="setFilter('GASTO',this)">Gastos</button>
  </div>
</div>
<p class="tip">Clic en ✏️ para editar · Clic en el badge de estado para cambiar rápido</p>

<div class="table-wrap">
  <table>

    </tr></thead>
    <tbody id="tbody"></tbody>

</div>

    <div class="fg"><label>No. Factura</label><input id="nf" placeholder="FAC-001"></div>

    <div class="fg"><label>Monto facturado ($)</label><input id="nmo" type="number" placeholder="0.00"></div>
    <div class="fg"><label>Estado</label>

    </div>
    <div class="fg"><label>Fecha</label><input id="nfe" type="date"></div>
    <div class="fg"><label>Notas</label><input id="nno" placeholder="Opcional"></div>

  </button>
</div>
<div class="stamp" id="stamp"></div>
</div>
<div class="toast" id="toast"></div>

// Save by updating index.html itself with new embedded data
async function saveOps(msg) {
  sync('syncing', 'Guardando...');
  try {
    // Get current SHA of index.html
    const shaResp = await fetch(IDX_URL, {
      headers: { 'Authorization': 'token ' + GH_TOKEN, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!shaResp.ok) throw new Error('SHA error: ' + shaResp.status);
    const shaData = await shaResp.json();
    const currentSha = shaData.sha;

    // Get current HTML content
    const currentHtml = atob(shaData.content.replace(/\n/g, ''));

    // Replace the ops data in the HTML
    const newOpsJson = JSON.stringify(ops);
    const newHtml = currentHtml.replace(
      /let ops = \[.*?\];/s,
      'let ops = ' + newOpsJson + ';'
    );

    if (newHtml === currentHtml) throw new Error('No se pudo reemplazar datos en HTML');

    const newContent = btoa(unescape(encodeURIComponent(newHtml)));
    const putResp = await fetch(IDX_URL, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + GH_TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ message: 'Actualizar operaciones', content: newContent, sha: currentSha })
    });

    if (!putResp.ok) {
      const err = await putResp.json().catch(()=>({}));
      throw new Error(putResp.status + ': ' + (err.message||''));
    }

    sync('ok', '✓ Guardado');
    setTimeout(() => sync('ok', 'Sincronizado'), 3000);
    if (msg) toast(msg);
  } catch(e) {
    sync('err', 'Error: ' + e.message);
    toast('⚠ ' + e.message);
    console.error(e);
  }
}

function getVisible() {
  return ops.filter(o => {
    if (filterEstado && o.estado !== filterEstado) return false;
    if (filterMonth && !(o.fecha||'').startsWith(filterMonth)) return false;
    return true;
  });
}
function setFilter(val, btn) {
  filterEstado = val; editingId = null;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(); renderPill();
}
function onMonthChange() {
  filterMonth = document.getElementById('monthSel').value;
  editingId = null; renderAll();
}
function fmt(n) { return '$' + Math.round(n||0).toLocaleString('es-MX'); }
function gan(o) { return (o.monto||0) - (o.gastos||0); }
const MESES = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function renderMonthFilter() {
  const months = [...new Set(ops.map(o => (o.fecha||'').slice(0,7)).filter(Boolean))].sort().reverse();
  const sel = document.getElementById('monthSel');
  const cur = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  months.forEach(ym => {
    const [y,m] = ym.split('-');
    sel.add(new Option(MESES[+m] + ' ' + y, ym));
  });
  if (cur) sel.value = cur;
}

function renderPill() {
  const v = getVisible();
  const total = v.filter(o=>o.estado!=='GASTO').length;
  const pag = v.filter(o=>o.estado==='PAGADO').length;
  const pen = v.filter(o=>o.estado==='PENDIENTE').length;
  const gas = v.filter(o=>o.estado==='GASTO').length;
  document.getElementById('opsPill').innerHTML =
    `<b>${total}</b> ops &nbsp;·&nbsp; <span style="color:#3B6D11">${pag} pagadas</span> &nbsp;·&nbsp; <span style="color:#BA7517">${pen} pendientes</span> &nbsp;·&nbsp; <span style="color:#A32D2D">${gas} gastos</span>`;
}

function renderMetrics() {
  const v = getVisible();
  const ing = v.filter(o=>o.estado!=='GASTO').reduce((s,o)=>s+(o.monto||0),0);
  const gas = v.reduce((s,o)=>s+(o.gastos||0),0);
  const net = ing - gas;
  const pen = v.filter(o=>o.estado==='PENDIENTE').reduce((s,o)=>s+(o.monto||0),0);
  const pct = ing>0?Math.round((net/ing)*100):0;
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="label">Total facturado</div><div class="value" style="color:#185FA5">${fmt(ing)}</div><div class="sub">${v.filter(o=>o.estado!=='GASTO').length} operaciones</div></div>
    <div class="metric"><div class="label">Gastos totales</div><div class="value" style="color:#A32D2D">${fmt(gas)}</div><div class="sub">Proveedores + operativos</div></div>
    <div class="metric"><div class="label">Ganancia neta</div><div class="value" style="color:${net>=0?'#3B6D11':'#A32D2D'}">${fmt(net)}</div><div class="sub">Margen ${pct}%</div></div>
    <div class="metric"><div class="label">Por cobrar</div><div class="value" style="color:#854F0B">${fmt(pen)}</div><div class="sub">${v.filter(o=>o.estado==='PENDIENTE').length} pendientes</div></div>
  `;
}

const COLORS = ['#185FA5','#1D9E75','#BA7517','#D4537E','#533AB7'];
function renderCharts() {
  const v = getVisible();
  const bySvc = {};
  v.filter(o=>o.estado!=='GASTO').forEach(o=>{ bySvc[o.servicio]=(bySvc[o.servicio]||0)+(o.monto||0); });
  const svL=Object.keys(bySvc), svD=svL.map(k=>Math.round(bySvc[k]));
  if(ch1) ch1.destroy();
  ch1 = new Chart(document.getElementById('c1').getContext('2d'),{
    type:'bar', data:{labels:svL,datasets:[{data:svD,backgroundColor:COLORS.slice(0,svL.length),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'$'+Math.round(c.parsed.y).toLocaleString('es-MX')}}},
      scales:{y:{ticks:{callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'rgba(0,0,0,0.05)'}},x:{grid:{display:false}}}
    }
  });
  document.getElementById('leg1').innerHTML = svL.map((l,i)=>
    `<span><span style="width:10px;height:10px;border-radius:2px;background:${COLORS[i]||'#888'};display:inline-block;margin-right:4px;"></span>${l}</span>`
  ).join('');
  const pag=v.filter(o=>o.estado==='PAGADO').reduce((s,o)=>s+(o.monto||0),0);
  const pen=v.filter(o=>o.estado==='PENDIENTE').reduce((s,o)=>s+(o.monto||0),0);
  if(ch2) ch2.destroy();
  ch2 = new Chart(document.getElementById('c2').getContext('2d'),{
    type:'doughnut', data:{labels:['Pagado','Pendiente'],datasets:[{data:[Math.round(pag),Math.round(pen)],backgroundColor:['#3B6D11','#BA7517'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'$'+Math.round(c.parsed).toLocaleString('es-MX')}}}
    }
  });
  const tot=pag+pen, p2=tot>0?Math.round((pag/tot)*100):0;
  document.getElementById('leg2').innerHTML = `
    <span><span style="width:10px;height:10px;border-radius:2px;background:#3B6D11;display:inline-block;margin-right:4px;"></span>Pagado ${p2}%</span>
    <span><span style="width:10px;height:10px;border-radius:2px;background:#BA7517;display:inline-block;margin-right:4px;"></span>Pendiente ${100-p2}%</span>`;
}

function renderTable() {
  const vis = getVisible().slice().reverse();
  const tbody = document.getElementById('tbody');
  if (!vis.length) { tbody.innerHTML='<tr><td colspan="10" style="text-align:center;padding:24px;color:#888">Sin operaciones</td></tr>'; return; }
  tbody.innerHTML = vis.map(o => {
    if (o.id === editingId) {
      const sO=['CATERING','HANDLING SUPERVISION','TRANSPORTACION','GASTO OPERATIVO'].map(s=>`<option${o.servicio===s?' selected':''}>${s}</option>`).join('');
      const eO=['PENDIENTE','PAGADO','GASTO'].map(s=>`<option${o.estado===s?' selected':''}>${s}</option>`).join('');
      return `
        <tr class="erow" id="er${o.id}">
          <td><input id="ec" value="${o.cliente}"></td>
          <td><input id="em" value="${o.matricula}" style="width:80px"></td>
          <td><input id="ef" value="${o.factura||''}" style="width:90px"></td>
          <td><select id="es" style="min-width:130px">${sO}</select></td>
          <td><input id="eg" type="number" value="${o.gastos||0}" style="width:90px;text-align:right"></td>
          <td><input id="emo" type="number" value="${o.monto||0}" style="width:90px;text-align:right"></td>
          <td></td>
          <td><select id="ee">${eO}</select></td>
          <td><input id="efe" type="date" value="${o.fecha||''}" style="width:130px"></td>
          <td style="white-space:nowrap">
            <button class="sbtn" onclick="saveEdit(${o.id})"><i class="ti ti-check" style="font-size:12px"></i> Guardar</button>
            <button class="cbtn" onclick="cancelEdit()" style="margin-left:4px">Cancelar</button>
          </td>
        </tr>
        <tr class="erow"><td colspan="10" style="padding:4px 6px 10px">
          <input id="eno" value="${o.notas||''}" placeholder="Notas..." style="width:100%;font-size:12px;padding:5px 8px;border:0.5px solid #185FA5;border-radius:6px;font-family:inherit">
        </td></tr>`;
    }
    const g=gan(o);
    return `<tr>
      <td style="font-weight:500">${o.cliente}${o.notas?`<br><span style="font-size:10px;color:#888;font-weight:400">${o.notas}</span>`:''}</td>
      <td class="mono">${o.matricula}</td>
      <td style="font-size:11px;color:#5F5E5A">${o.factura||'—'}</td>
      <td>${o.servicio}</td>
      <td style="text-align:right;color:#5F5E5A">${o.gastos?fmt(o.gastos):'—'}</td>
      <td style="text-align:right">${o.monto?fmt(o.monto):'—'}</td>
      <td style="text-align:right;color:${g>=0?'#3B6D11':'#A32D2D'}">${fmt(g)}</td>
      <td><span class="badge ${o.estado}" onclick="toggleEstado(${o.id})">${o.estado}</span></td>
      <td style="font-size:11px;color:#888">${o.fecha||'—'}</td>
      <td style="white-space:nowrap">
        <button class="abtn" onclick="startEdit(${o.id})"><i class="ti ti-pencil"></i></button>
        <button class="abtn del" onclick="delOp(${o.id})"><i class="ti ti-trash"></i></button>
      </td>
    </tr>`;
  }).join('');
}

function startEdit(id) { editingId=id; renderTable(); document.getElementById('er'+id)?.scrollIntoView({behavior:'smooth',block:'center'}); }
function cancelEdit() { editingId=null; renderTable(); }

async function saveEdit(id) {
  const o = ops.find(x=>x.id===id);
  if (!o) return;
  o.cliente   = document.getElementById('ec').value.trim().toUpperCase()||o.cliente;
  o.matricula = document.getElementById('em').value.trim().toUpperCase()||o.matricula;
  o.factura   = document.getElementById('ef').value.trim();
  o.servicio  = document.getElementById('es').value;
  o.gastos    = parseFloat(document.getElementById('eg').value)||0;
  o.monto     = parseFloat(document.getElementById('emo').value)||0;
  o.estado    = document.getElementById('ee').value;
  o.fecha     = document.getElementById('efe').value;
  o.notas     = document.getElementById('eno').value.trim();
  editingId   = null;
  renderAll();
  await saveOps('✓ Operación actualizada');
}

async function toggleEstado(id) {
  const o = ops.find(x=>x.id===id);
  if (!o||o.estado==='GASTO') return;
  o.estado = o.estado==='PENDIENTE'?'PAGADO':'PENDIENTE';
  renderAll();
  await saveOps('Estado actualizado ✓');
}

async function delOp(id) {
  if (!confirm('¿Eliminar esta operación?')) return;
  ops = ops.filter(o=>o.id!==id);
  renderAll();
  await saveOps('Operación eliminada');
}

async function addOp() {
  const cliente=document.getElementById('nc').value.trim().toUpperCase();
  const matricula=document.getElementById('nm').value.trim().toUpperCase();
  if (!cliente||!matricula) { toast('⚠ Ingresa cliente y matrícula'); return; }
  const btn=document.getElementById('addBtn');
  btn.disabled=true;
  ops.push({
    id:nextId++, cliente, matricula,
    factura:document.getElementById('nf').value.trim(),
    servicio:document.getElementById('ns').value,
    gastos:parseFloat(document.getElementById('ng').value)||0,
    monto:parseFloat(document.getElementById('nmo').value)||0,
    estado:document.getElementById('ne').value,
    fecha:document.getElementById('nfe').value,
    notas:document.getElementById('nno').value.trim(),
  });
  ['nc','nm','nf','ng','nmo','nno'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('nfe').value=new Date().toISOString().split('T')[0];
  renderAll();
  await saveOps('✓ Operación agregada');
  btn.disabled=false;
}

function renderAll() {
  renderMonthFilter(); renderPill(); renderMetrics(); renderCharts(); renderTable();
  document.getElementById('stamp').textContent='Actualizado: '+new Date().toLocaleString('es-MX');
}

document.getElementById('hdate').textContent=new Date().toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('nfe').value=new Date().toISOString().split('T')[0];
sync('ok','Listo');
renderAll();
</script>
</body>
</html>
